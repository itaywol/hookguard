name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Copy the binary to a target-and-version-tagged name so assets don't
      # collide and cargo-binstall's default pkg-url template resolves:
      # { repo }/releases/download/v{ version }/git-hooks-{ target }-v{ version }{ binary-ext }
      # bash is available on all three runner OSes.
      - name: Package
        shell: bash
        run: |
          ext=""
          [[ "${{ matrix.target }}" == *windows* ]] && ext=".exe"
          src="target/${{ matrix.target }}/release/git-hooks${ext}"
          out="git-hooks-${{ matrix.target }}-${{ github.ref_name }}${ext}"
          cp "$src" "$out"
          echo "ASSET=$out" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}

  publish-crate:
    # Publish to crates.io only after every platform build has succeeded.
    # Skips (rather than fails) when CARGO_TOKEN is not configured, so binary
    # releases still work while crates.io publishing is unavailable — re-run
    # the job after adding the secret to publish.
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for crates.io token
        id: token
        env:
          CARGO_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          if [ -z "$CARGO_TOKEN" ]; then
            echo "::warning::CARGO_TOKEN secret is not set — skipping crates.io publish." \
                 "Add it under Settings → Secrets and variables → Actions, then re-run this job."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to crates.io
        if: steps.token.outputs.present == 'true'
        run: cargo publish --token ${{ secrets.CARGO_TOKEN }}
